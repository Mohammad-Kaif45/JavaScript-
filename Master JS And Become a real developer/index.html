<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Password Validator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #333;
        }

        button {
            background-color: #1660d7;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
        
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        #successMessage {
            color: green;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Email & Password Validator</h1>

        <form autocomplete="off" id="loginForm">

            <div class="form-group">
                <label for="email">Email</label>

                <input 
                    type="text" 
                    id="email" 
                    placeholder="Enter your email"
                >

                <p id="emailError" class="error"></p>
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your password"
                >

                <p id="passwordError" class="error"></p>
            </div>

            <button type="submit">Validate</button>

            <p id="successMessage"></p>


        </form>
    </div>


    <script src="script.js"></script>

</body>
</html>
