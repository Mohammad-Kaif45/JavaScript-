<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            box-sizing: border-box;
        }
        html,body {
            width: 100%;
            height: 100%;
            
        }

        #main {
            
            padding: 30px;
            width: 100%;
            height: 100%;
            background-color: #222;
        }
        input {
            display: block;
        }
        .card {
            display: inline-block;
            padding: 20px;
            margin-top: 40px;
            color: white;
            border: 1px solid #555;
            border-radius: 10px;
            
        }
        .profile {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            margin-bottom: 20px;
            overflow: hidden;
        }
     
        .card p {
            font-size: 12px;
            margin-top: 10px;
        }
        .card h5{
            margin-top: 5px;
        }
        .profile img {
            height: 100%;
            width: 100%;
            
            
        }
    </style>
</head>
<body>
    
    <div id="main">
        <form action="">
            
            <input type="text" placeholder="profile pic">
            <input type="text" placeholder="name">
            <input type="text" placeholder="occupation">
            <input type="text" placeholder="info">
            <input type="submit">
        </form>
        
    </div>

    
    <script src="Script.js"></script>
</body>
</html>
